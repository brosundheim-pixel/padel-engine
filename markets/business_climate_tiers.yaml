# v0 categorical business-climate tiers. Used as output FLAG in candidate
# scoring; NEVER as score-input. See METHODOLOGY.md "Business climate tier
# (v0 categorical, not quantitative)" and CLAUDE.md anti-pattern #17.
#
# Engine deliberately does NOT estimate construction costs, property taxes,
# or permitting timelines numerically. Categorical tiers only. If a future
# code path wants to add quantitative cost fields ($/sqft, $/year property
# tax), refuse and surface to operator.

version: 0

tiers:
  TIER_1_FAVORABLE:
    description: "0%-low income tax + low-moderate property tax + fast permitting + low construction. Strong unit economics. BUILD candidates score without caveat."
  TIER_2_NEUTRAL:
    description: "Moderate tax + moderate permitting. No structural blocker, no advantage. BUILD candidates score without caveat."
  TIER_3_PREMIUM:
    description: "High tax + slow permitting. Premium pricing power assumed compensates. BUILD candidates carry 'BUILD with assumed pricing power' caveat."
  TIER_4_PROHIBITIVE:
    description: "Construction + permitting kill unit economics at $1.2-2M capex target. BUILD candidates carry 'ECONOMIC_GATE_RISK for underwriting' flag — likely fail underwriting even when demographics qualify."

# State-level defaults. Apply unless overridden by metro_overrides below.
# Sources: state income tax rates, Tax Foundation property tax effective rates,
# qualitative permitting + construction-cost benchmarks. v0 — refine as more
# market data accumulates.
