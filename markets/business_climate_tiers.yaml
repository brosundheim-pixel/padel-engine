# TIER_3 sub-flag: states with effective property tax >2% carry an
# ADDITIONAL flag in output: "TIER_3 with extreme property tax burden —
# premium pricing must hold AND property tax is highest tier in country."
# v0: only NJ at 2.08% effective. Update when refresh data places others
# above 2%.
extreme_property_tax_states:
  - NJ

# Metro-level overrides. Apply AFTER state_defaults. First matching prefix
# wins. Zip-prefix match: candidate zip starts with any string in
# zip_prefixes. v0: schema documented for current and near-term overrides;
# extend as candidate universe grows.
metro_overrides:
  - metro: NYC-proper
    state: NY
    zip_prefixes: ["100", "101", "102", "103", "104", "112", "113", "114", "116"]
    tier: TIER_4
    rationale: "NY state 10.9% income + NYC city 3.876% (~14.8% combined) + extreme construction + slow permitting. Override of NY default TIER_3 for the 5 boroughs."

  - metro: Chicago-city
    state: IL
    zip_prefixes: ["606"]
    tier: TIER_3
    rationale: "Chicago city tax + high property + slow permitting. North Shore suburbs (Cook outside city / Lake County) keep IL default TIER_2."

  - metro: Seattle-proper
    state: WA
    zip_prefixes: ["981"]
    tier: TIER_4
    rationale: "Extreme construction + permitting. WA default TIER_3 holds for eastside premium suburbs (Bellevue / Mercer Island in 980 prefix)."

